<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RECON · 진술 기반 전신 용의자 재구성</title>
<style>
:root{--bg:#0c1016;--panel:#10151d;--line:#1d2734;--line2:#27323f;--ink:#dbe5f0;--ink2:#8395a8;--ink3:#4a586a;--signal:#ff6b35;--signal2:#ffaa80;--mono:'SF Mono',ui-monospace,Menlo,monospace;--sans:'Inter',-apple-system,'Pretendard',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);display:flex;height:100vh;overflow:hidden}
#view{flex:1;position:relative;background:radial-gradient(ellipse at 50% 42%,#1b2430,#0a0e13)}
#view canvas{display:block;cursor:grab}#view canvas:active{cursor:grabbing}
.tag{position:absolute;font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:1px;pointer-events:none}
.tag.tl{left:16px;top:14px}.tag.bl{left:16px;bottom:14px;color:var(--ink2)}
#stagePills{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
#stagePills button{font-family:var(--mono);font-size:10.5px;padding:6px 12px;border:1px solid var(--line2);background:rgba(16,21,29,.8);color:var(--ink3);border-radius:20px;cursor:pointer}
#stagePills button.on{background:var(--signal);border-color:var(--signal);color:#fff}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;color:var(--ink2)}
aside{width:340px;flex:none;border-left:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-height:0;overflow-y:auto}
aside::-webkit-scrollbar{width:6px}aside::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
header{padding:14px 16px;border-bottom:1px solid var(--line)}header h1{font-size:14px;font-weight:700}header .sub{font-family:var(--mono);font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.blk{padding:13px 16px;border-bottom:1px solid var(--line)}
.lbl{font-family:var(--mono);font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px}
.inrow{display:flex;gap:7px}
input[type=text]{flex:1;background:#0a0f15;border:1px solid var(--line2);color:var(--ink);border-radius:7px;padding:9px 11px;font-size:12.5px;outline:none}
input[type=text]:focus{border-color:var(--signal)}input::placeholder{color:var(--ink3)}
button{font-family:var(--sans);cursor:pointer;border:1px solid var(--line2);background:#161d28;color:var(--ink);border-radius:7px;padding:9px 12px;font-size:12.5px;transition:.15s;display:flex;align-items:center;gap:6px;justify-content:center}
button:hover{border-color:var(--ink3);background:#1b2430}
button.primary{background:var(--signal);border-color:var(--signal);color:#fff;font-weight:600}button.primary:hover{background:#ff844a}
button.ghost{color:var(--ink2)}button.mic{flex:1;font-weight:600}button.mic.on{background:var(--signal);border-color:var(--signal);color:#1a0800}
select{background:#0a0f15;border:1px solid var(--line2);color:var(--ink);border-radius:7px;padding:7px 9px;font-size:12px;flex:1}
.row2{display:flex;gap:7px;align-items:center;margin-bottom:7px}.row2 label{font-size:11.5px;color:var(--ink2);width:46px;flex:none}
.sl{margin:9px 0}.sl .r{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink2);margin-bottom:4px}.sl .r b{font-family:var(--mono);color:var(--signal2);font-size:11px}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:3px;background:var(--line2);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--signal);cursor:pointer;border:2px solid #10151d}
.swatches{display:flex;gap:5px;flex-wrap:wrap}.sw{width:22px;height:22px;border-radius:5px;border:2px solid transparent;cursor:pointer}.sw.on{border-color:var(--ink)}
.tog{display:flex;gap:6px}.tog button{flex:1;font-size:11px;padding:6px}
.status{font-family:var(--mono);font-size:10px;color:var(--ink3);padding:8px 16px;border-top:1px solid var(--line);background:#0a0f15;min-height:30px;display:flex;align-items:center;position:sticky;bottom:0}
@media(max-width:760px){body{flex-direction:column}aside{width:100%;border-left:none;border-top:1px solid var(--line);max-height:50vh}#view{min-height:320px}}
</style></head>
<body>
<div id="view">
  <div class="tag tl">RECON · SUSPECT RECON — 드래그 회전</div>
  <div id="stagePills"><button data-st="face">얼굴</button><button data-st="body">전신</button><button data-st="scene">현장</button></div>
  <div class="tag bl" id="viewNote">진술하면 단계에 따라 카메라가 이동합니다</div>
  <div id="loading">메시 로딩 중…</div>
  <button id="dbgToggle" style="position:absolute;left:14px;bottom:14px;z-index:6;padding:6px 10px;font-size:11px;background:#161d28;border:1px solid var(--line2);color:var(--ink);border-radius:7px;cursor:pointer">🔧 조정</button>
  <div id="dbg" style="position:absolute;left:14px;bottom:48px;background:rgba(10,14,20,.94);border:1px solid var(--line2);border-radius:9px;padding:11px;width:218px;display:none;z-index:6">
    <div style="font-family:var(--mono);font-size:9px;color:var(--ink3);margin-bottom:7px;letter-spacing:.5px">DEBUG · 맞춘 값을 알려주세요</div>
    <div id="dbgRows"></div>
    <div style="display:flex;gap:5px;margin-top:8px">
      <button id="dbgFront" style="flex:1;padding:6px;font-size:10.5px;background:#161d28;border:1px solid var(--line2);color:var(--ink);border-radius:6px;cursor:pointer">정면고정</button>
      <button id="dbgSpin" style="flex:1;padding:6px;font-size:10.5px;background:#161d28;border:1px solid var(--line2);color:var(--ink);border-radius:6px;cursor:pointer">회전 재개</button>
    </div>
    <div id="dbgOut" style="font-family:var(--mono);font-size:9px;color:var(--signal2);margin-top:8px;line-height:1.6;word-break:break-all"></div>
  </div>
</div>
<aside>
  <header><h1>전신 용의자 재구성</h1><div class="sub">statement → full-body suspect</div></header>
  <div class="blk">
    <div class="lbl">음성 / 텍스트 진술</div>
    <div class="inrow" style="margin-bottom:7px"><button class="mic" id="micBtn"><span id="micLabel">🎙 음성 진술</span></button></div>
    <div class="inrow"><input type="text" id="stmt" placeholder="예: 광대 튀어나오고 코 긴 30대 남자, 검은 후드티에 청바지, 편의점 앞"><button class="primary" id="genBtn">생성</button></div>
  </div>
  <div class="blk">
    <div class="lbl">착장</div>
    <div class="row2"><label>상의</label><select id="topSel"><option value="none">없음</option><option value="tee">티셔츠</option><option value="hoodie" selected>후드티</option><option value="jacket">재킷</option></select></div>
    <div class="swatches" id="topSw" style="margin-bottom:8px"></div>
    <div class="row2"><label>하의</label><select id="botSel"><option value="none">없음</option><option value="pants" selected>긴바지</option><option value="shorts">반바지</option></select></div>
    <div class="swatches" id="botSw" style="margin-bottom:8px"></div>
    <div class="tog"><button id="shoesBtn" class="on">신발</button><button id="capBtn">모자</button><button id="bagBtn">가방</button></div>
  </div>
  <div class="blk">
    <div class="lbl">체형</div>
    <div class="sl"><div class="r"><span>키</span><b id="v_height">0.50</b></div><input type="range" min="0" max="1" step="0.01" value="0.5" id="s_height"></div>
    <div class="sl"><div class="r"><span>체격 (마름↔건장)</span><b id="v_build">0.50</b></div><input type="range" min="0" max="1" step="0.01" value="0.5" id="s_build"></div>
    <div class="sl"><div class="r"><span>어깨 너비</span><b id="v_shoulder">0.50</b></div><input type="range" min="0" max="1" step="0.01" value="0.5" id="s_shoulder"></div>
  </div>
  <div class="blk">
    <div class="lbl">피부 / 머리</div>
    <div class="row2"><label>피부</label><div class="swatches" id="skinSw"></div></div>
    <div class="row2" style="margin-top:6px"><label>머리</label><div class="swatches" id="hairSw"></div></div>
    <div class="tog" style="margin-top:8px" id="hairSeg"></div>
  </div>
  <div class="blk" style="display:flex;gap:7px;border-bottom:none"><button class="ghost" id="randBtn" style="flex:1">🎲 랜덤</button><button class="ghost" id="resetBtn" style="flex:1">↺ 초기화</button></div>
  <div class="status" id="status">대기 중</div>
</aside>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  [...document.querySelectorAll('#stagePills button')].forEach(b=>b.classList.toggle('on',b.dataset.st===s));if(window._dbgRefresh)window._dbgRefresh();}
function animate(){requestAnimationFrame(animate);if(!drag&&!paused)idle+=rotSpeed;root.rotation.y=rotY+idle;
  camPos.lerp(wantPos,0.07);camTgt.lerp(wantTgt,0.07);cam.position.copy(camPos);cam.lookAt(camTgt);renderer.render(scene,cam);}

/* 얼굴 조각 */
function sculptFace(){
  const d=k=>(FP[k]-0.5)*2;
  const L=1+d('face_length')*.22,W=1+d('face_width')*.20;
  const jaw=d('jaw_width'),chin=d('chin'),cheek=d('cheek'),fore=d('forehead'),brow=d('brow'),eS=d('eye_size'),eSp=d('eye_spacing'),nL=d('nose_length'),nW=d('nose_width'),mW=d('mouth_width'),lip=d('lip'),ear=d('ear');
  const p=hgeo.attributes.position.array;
  for(let i=0;i<HNV;i++){const bx=hBase[i*3],by=hBase[i*3+1],bz=hBase[i*3+2];let X=bx*W,Y=by*L,Z=bz;const s=Math.sign(bx)||1;
    const jw=sm((0.2-by)/0.5)*sm((by+0.45)/0.3);X+=s*jaw*0.22*jw;
    const wc=fall(bx,by,bz,0,-0.18,0.34,0.34);Z+=chin*0.22*wc;Y-=chin*0.10*wc;
    const wl=fall(bx,by,bz,0.46,0.14,0.34,0.34),wr=fall(bx,by,bz,-0.46,0.14,0.34,0.34);X+=cheek*0.26*(wl-wr);Z+=cheek*0.12*(wl+wr);
    Z+=fore*0.18*(sm((by-0.5)/0.35)*sm(bz/0.2));Z+=brow*0.16*fall(bx,by,bz,0,0.44,0.40,0.42);
    const wn=fall(bx,by,bz,0,0.15,0.45,0.26);Z+=nL*0.34*wn;Y-=nL*0.10*wn;X+=s*nW*0.20*wn;
    const we=fall(bx,by,bz,0.25,0.37,0.42,0.17)+fall(bx,by,bz,-0.25,0.37,0.42,0.17);X+=(bx-s*0.25)*eS*0.5*we+s*eSp*0.18*we;Y+=(by-0.37)*eS*0.5*we;
    const wm=fall(bx,by,bz,0,0.02,0.44,0.22);X+=s*mW*0.28*wm;Z+=lip*0.16*wm;
    const wE=fall(bx,by,bz,0.86,0.30,-0.05,0.30)+fall(bx,by,bz,-0.86,0.30,-0.05,0.30);X+=s*ear*0.26*wE;Y+=(by-0.30)*ear*0.3*wE;
    p[i*3]=X;p[i*3+1]=Y;p[i*3+2]=Z;}
  hgeo.attributes.position.needsUpdate=true;hgeo.computeVertexNormals();SKINMAT.color.set(skinTone);
}
/* 체형 변형 (실제 보디) */
function morphBody(){
  const hF=lerp(0.92,1.10,BODY.height),bF=lerp(0.86,1.24,BODY.build),sF=lerp(0.90,1.18,BODY.shoulder);
  const zc=0.017,p=bgeo.attributes.position.array;
  for(let i=0;i<BNV;i++){const bx=bBase[i*3],by=bBase[i*3+1],bz=bBase[i*3+2];
    const sh=by>1.2?sF:1;
    p[i*3]=bx*bF*sh;p[i*3+1]=by*hF;p[i*3+2]=zc+(bz-zc)*bF;}
  bgeo.attributes.position.needsUpdate=true;bgeo.computeVertexNormals();
  // 헤드/악세 위치도 키에 맞춤
  headPivot.position.set(0,HEAD_Y*hF,HEAD_Z);headPivot.scale.setScalar(HEAD_SC*lerp(0.97,1.03,BODY.height));
}
/* 착장 색칠 */
/* 몸 색칠: 상의/팔은 살색(옷이 덮음), 하의·신발만 칠함 */
function paintBody(){
  const col=bgeo.attributes.color.array;const skin=new THREE.Color(skinTone);
  const bot=new THREE.Color(cloth.botColor),sho=new THREE.Color(cloth.shoesColor);
  for(let i=0;i<BNV;i++){const r=bReg[i],by=bBase[i*3+1];let c=skin;
    if(r===3){ if(cloth.bottom==='none')c=skin; else if(cloth.bottom==='shorts')c=by>0.62?bot:skin; else c=bot; }
    else if(r===4){c=cloth.shoes?sho:skin;}
    else c=skin;
    col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;}
  bgeo.attributes.color.needsUpdate=true;
}
/* 깨끗한 옷 형상 (보디와 무관하게 0부터 생성) */
function lathe(profile,seg,mat){
  const pos=[],idx=[],n=profile.length;
  for(const p of profile)for(let j=0;j<seg;j++){const a=j/seg*Math.PI*2;pos.push(p.cx+p.rx*Math.cos(a),p.y,p.cz+p.rz*Math.sin(a));}
  for(let i=0;i<n-1;i++)for(let j=0;j<seg;j++){const a=i*seg+j,b=i*seg+(j+1)%seg,c=(i+1)*seg+j,d=(i+1)*seg+(j+1)%seg;idx.push(a,b,d,a,d,c);}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));g.setIndex(idx);g.computeVertexNormals();
  return new THREE.Mesh(g,mat);
}
function sleeveMesh(sgn,yTop,yBot,rTop,rBot,bF,mat){
  const prof=[],steps=8;
  for(let t=0;t<=steps;t++){const f=t/steps,y=yTop+(yBot-yTop)*f,x=sgn*(0.19+0.04*f),r=(rTop+(rBot-rTop)*f)*bF;prof.push({y:y,cx:x,cz:0.01,rx:r,rz:r});}
  return lathe(prof,18,mat);
}
function buildGarment(){
  garment.clear();
  const hF=lerp(0.92,1.10,BODY.height),bF=lerp(0.9,1.2,BODY.build);
  if(cloth.top!=='none'){
    const mat=clayMat(cloth.topColor);
    const hoodie=cloth.top==='hoodie',tee=cloth.top==='tee';
    const hem=hoodie?0.84:0.92;
    const ring=[[1.47,.20,.13],[1.43,.235,.155],[1.36,.225,.15],[1.22,.205,.145],[1.08,.195,.135],[hem+0.07,.205,.14],[hem,.215,.145]];
    const prof=ring.map(([y,rx,rz])=>({y:y*hF,cx:0,cz:0.015,rx:rx*bF,rz:rz*bF}));
    garment.add(lathe(prof,44,mat));
    const sBot=tee?1.16:0.88;
    [1,-1].forEach(sg=>garment.add(sleeveMesh(sg,1.45*hF,sBot*hF,0.085,(tee?0.075:0.05),bF,mat)));
    if(hoodie){const hd=new THREE.Mesh(new THREE.SphereGeometry(0.135,20,16,0,6.3,0,2.0),mat);hd.position.set(0,HEAD_Y*hF-0.12,HEAD_Z-0.14);hd.rotation.x=0.55;garment.add(hd);}
    if(cloth.top==='jacket'){const cl=new THREE.Mesh(new THREE.TorusGeometry(0.075*bF,0.025,8,24),mat);cl.position.set(0,1.45*hF,0.02);cl.rotation.x=Math.PI/2;garment.add(cl);}
  }
  if(cloth.cap){const m=clayMat(cloth.capColor),hy=HEAD_Y*lerp(0.92,1.10,BODY.height);
    const cap=new THREE.Mesh(new THREE.SphereGeometry(0.155,18,14,0,6.3,0,1.65),m);cap.position.set(0,hy+0.05,HEAD_Z-0.01);garment.add(cap);
    const brim=new THREE.Mesh(new THREE.BoxGeometry(0.30,0.02,0.22),m);brim.position.set(0,hy+0.03,HEAD_Z+0.20);garment.add(brim);}
  if(cloth.bag){const m=clayMat('#36312c'),hF2=lerp(0.92,1.10,BODY.height);
    const bag=new THREE.Mesh(new THREE.BoxGeometry(0.16,0.22,0.08),m);bag.position.set(0.27,0.95*hF2,-0.04);garment.add(bag);
    const st=new THREE.Mesh(new THREE.CylinderGeometry(0.014,0.014,0.55,8),m);st.position.set(0.14,1.25*hF2,0.0);st.rotation.z=0.5;garment.add(st);}
}
function applyHair(){
  if(hairStyle===0||cloth.cap){hairMesh.visible=false;return;}hairMesh.visible=true;
  const cfg={1:{sx:1.02,sy:.95,sz:1.02,py:.18,pz:-.12},2:{sx:1.06,sy:1.0,sz:1.08,py:.16,pz:-.16},3:{sx:1.08,sy:1.25,sz:1.10,py:.05,pz:-.20}}[hairStyle];
  hairMesh.rotation.x=-0.25;hairMesh.scale.set(cfg.sx,cfg.sy,cfg.sz);hairMesh.position.set(0,cfg.py,cfg.pz);hairMesh.material.color.set(hairColor);
}
function rebuildAll(){sculptFace();morphBody();paintBody();buildGarment();applyHair();}

/* 진술 → JSON */
async function statementToSuspect(text){
  if(!SUSPECT_API_KEY) throw new Error("API 키 필요 (메인 앱에서 입력)");
  const prompt=`너는 목격자 진술을 "전신 용의자 3D 재구성" 파라미터로 변환한다.
진술의 마지막 부분이 무엇을 묘사하는지로 stage 를 정한다: 얼굴=face, 옷·착장·체형=body, 장소·상황=scene.
수치 0~1(없으면 0.5).
[얼굴]face_length,face_width,jaw_width,chin,cheek,forehead,brow,eye_size,eye_spacing,nose_length,nose_width,mouth_width,lip,ear
[체형]height,build(마름0↔건장1),shoulder
[착장]top:none|tee|hoodie|jacket,topColor(#hex),bottom:none|pants|shorts,botColor(#hex),shoes(bool),shoesColor(#hex),cap(bool),capColor(#hex),bag(bool)
[기타]skin 0~5(밝→어둠,4창백,5붉은기),hair 0~3(0민머리1짧은2보통3긴),hairColor 0~5(0검정1진갈2갈색3금발4흰머리5흑발)
[진술]
${text}
JSON만:{"stage":"body","face":{...},"body":{"height":0.5,"build":0.5,"shoulder":0.5},"clothing":{"top":"hoodie","topColor":"#222222","bottom":"pants","botColor":"#2f3a52","shoes":true,"shoesColor":"#1a1a1a","cap":false,"capColor":"#222222","bag":false},"skin":1,"hair":1,"hairColor":0}`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    headers2:0});
  if(!res.ok)throw new Error("API "+res.status);
  const data=await res.json();let t=(data.content||[]).map(b=>b.text||"").join("").trim().replace(/```json/gi,"").replace(/```/g,"").trim();
  const a=t.indexOf("{"),b=t.lastIndexOf("}");if(a>=0)t=t.slice(a,b+1);return JSON.parse(t);
}
function applyResult(r){
  if(r.face)Object.keys(FP).forEach(k=>{if(typeof r.face[k]==='number')FP[k]=clamp(r.face[k],0,1);});
  if(r.body)['height','build','shoulder'].forEach(k=>{if(typeof r.body[k]==='number')BODY[k]=clamp(r.body[k],0,1);});
  if(r.clothing){const c=r.clothing;if(c.top)cloth.top=c.top;if(c.topColor)cloth.topColor=c.topColor;if(c.bottom)cloth.bottom=c.bottom;if(c.botColor)cloth.botColor=c.botColor;
    if(typeof c.shoes==='boolean')cloth.shoes=c.shoes;if(c.shoesColor)cloth.shoesColor=c.shoesColor;if(typeof c.cap==='boolean')cloth.cap=c.cap;if(c.capColor)cloth.capColor=c.capColor;if(typeof c.bag==='boolean')cloth.bag=c.bag;}
  if(typeof r.skin==='number')skinTone=SKINS[clamp(r.skin|0,0,5)];
  if(typeof r.hair==='number')hairStyle=clamp(r.hair|0,0,3);
  if(typeof r.hairColor==='number')hairColor=HAIRCOLS[clamp(r.hairColor|0,0,5)];
  syncUI();rebuildAll();if(r.stage&&STAGES[r.stage])setStage(r.stage);
}

/* UI */
function bindSlider(k){const s=document.getElementById('s_'+k),v=document.getElementById('v_'+k);s.addEventListener('input',e=>{BODY[k]=parseFloat(e.target.value);v.textContent=BODY[k].toFixed(2);rebuildAll();});}
['height','build','shoulder'].forEach(bindSlider);
document.getElementById('topSel').onchange=e=>{cloth.top=e.target.value;rebuildAll();};
document.getElementById('botSel').onchange=e=>{cloth.bottom=e.target.value;rebuildAll();};
function tog(id,key){const b=document.getElementById(id);b.onclick=()=>{cloth[key]=!cloth[key];b.classList.toggle('on',cloth[key]);rebuildAll();};}
tog('shoesBtn','shoes');tog('capBtn','cap');tog('bagBtn','bag');
function swG(el,cols,get,set){cols.forEach(c=>{const s=document.createElement('div');s.className='sw';s.style.background=c;if(c===get())s.classList.add('on');
  s.onclick=()=>{set(c);[...el.children].forEach(x=>x.classList.remove('on'));s.classList.add('on');rebuildAll();};el.appendChild(s);});}
swG(document.getElementById('topSw'),CLOTHCOLS,()=>cloth.topColor,c=>cloth.topColor=c);
swG(document.getElementById('botSw'),CLOTHCOLS,()=>cloth.botColor,c=>cloth.botColor=c);
swG(document.getElementById('skinSw'),SKINS,()=>skinTone,c=>skinTone=c);
swG(document.getElementById('hairSw'),HAIRCOLS,()=>hairColor,c=>hairColor=c);
const hairSeg=document.getElementById('hairSeg');HAIR.forEach((hn,i)=>{const b=document.createElement('button');b.textContent=hn;if(i===hairStyle)b.classList.add('on');b.onclick=()=>{hairStyle=i;[...hairSeg.children].forEach(c=>c.classList.remove('on'));b.classList.add('on');rebuildAll();};hairSeg.appendChild(b);});
function syncUI(){['height','build','shoulder'].forEach(k=>{document.getElementById('s_'+k).value=BODY[k];document.getElementById('v_'+k).textContent=BODY[k].toFixed(2);});
  document.getElementById('topSel').value=cloth.top;document.getElementById('botSel').value=cloth.bottom;
  document.getElementById('shoesBtn').classList.toggle('on',cloth.shoes);document.getElementById('capBtn').classList.toggle('on',cloth.cap);document.getElementById('bagBtn').classList.toggle('on',cloth.bag);
  [...hairSeg.children].forEach((c,i)=>c.classList.toggle('on',i===hairStyle));
  [['topSw',()=>cloth.topColor,CLOTHCOLS],['botSw',()=>cloth.botColor,CLOTHCOLS],['skinSw',()=>skinTone,SKINS],['hairSw',()=>hairColor,HAIRCOLS]].forEach(([id,get,cols])=>{[...document.getElementById(id).children].forEach((x,i)=>x.classList.toggle('on',cols[i]===get()));});}
[...document.querySelectorAll('#stagePills button')].forEach(b=>b.onclick=()=>setStage(b.dataset.st));
const status=document.getElementById('status'),setS=t=>status.textContent=t;
let accumulated="";
async function processStatement(text,append){if(!text.trim())return;accumulated=append?(accumulated+" "+text).trim():text.trim();setS('진술 분석 중 — 용의자 재구성…');
  try{applyResult(await statementToSuspect(accumulated));setS('재구성 갱신 · 단계: '+stage);document.getElementById('viewNote').textContent='진술 기반 재구성 · 드래그 회전';}catch(err){setS('생성 실패: '+err.message+' (수동 조정 가능)');}}
document.getElementById('genBtn').onclick=()=>{const v=document.getElementById('stmt').value;document.getElementById('stmt').value='';processStatement(v,false);};
document.getElementById('stmt').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('genBtn').click();});
document.getElementById('randBtn').onclick=()=>{Object.keys(FP).forEach(k=>FP[k]=Math.random());['height','build','shoulder'].forEach(k=>BODY[k]=Math.random());
  cloth.top=['none','tee','hoodie','jacket'][Math.floor(Math.random()*4)];cloth.bottom=['pants','shorts'][Math.floor(Math.random()*2)];
  cloth.topColor=CLOTHCOLS[Math.floor(Math.random()*CLOTHCOLS.length)];cloth.botColor=CLOTHCOLS[Math.floor(Math.random()*CLOTHCOLS.length)];
  skinTone=SKINS[Math.floor(Math.random()*6)];hairColor=HAIRCOLS[Math.floor(Math.random()*6)];hairStyle=Math.floor(Math.random()*4);syncUI();rebuildAll();setS('랜덤 생성');};
document.getElementById('resetBtn').onclick=()=>{Object.keys(FP).forEach(k=>FP[k]=.5);['height','build','shoulder'].forEach(k=>BODY[k]=.5);
  cloth={top:'jacket',topColor:'#33405e',bottom:'pants',botColor:'#2f3a52',shoes:true,shoesColor:'#15171c',cap:false,capColor:'#222',bag:false};
  hairStyle=0;skinTone=SKINS[1];hairColor=HAIRCOLS[0];accumulated="";syncUI();rebuildAll();setStage('body');setS('초기화됨');};
const micBtn=document.getElementById('micBtn'),micLabel=document.getElementById('micLabel');let recog=null,listening=false;const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function initRecog(){if(!SR){setS('음성 미지원 — 텍스트 사용');return false;}recog=new SR();recog.lang='ko-KR';recog.continuous=true;recog.interimResults=true;
  recog.onresult=e=>{for(let i=e.resultIndex;i<e.results.length;i++){const r=e.results[i];if(r.isFinal)processStatement(r[0].transcript,true);}};
  recog.onerror=e=>{setS('음성 오류: '+e.error);stopMic();};recog.onend=()=>{if(listening){try{recog.start();}catch(_){}}};return true;}
function startMic(){if(!recog&&!initRecog())return;try{recog.start();}catch(_){}listening=true;micBtn.classList.add('on');micLabel.textContent='■ 중지';setS('듣는 중 — 얼굴→착장→현장 순으로 진술해보세요');}
function stopMic(){listening=false;if(recog){try{recog.stop();}catch(_){}}micBtn.classList.remove('on');micLabel.textContent='🎙 음성 진술';}
micBtn.onclick=()=>listening?stopMic():startMic();
/* ===== DEBUG 패널 ===== */
(function(){
  const rows=[
    {k:'머리 크기',min:0.06,max:0.20,step:0.002,get:()=>HEAD_SC,set:v=>HEAD_SC=v},
    {k:'머리 높이',min:1.30,max:1.85,step:0.005,get:()=>HEAD_Y,set:v=>HEAD_Y=v},
    {k:'머리 앞뒤',min:-0.12,max:0.22,step:0.005,get:()=>HEAD_Z,set:v=>{HEAD_Z=v;headPivot.position.z=v;}},
    {k:'카메라 거리',min:0.3,max:9,step:0.05,get:()=>STAGES[stage].p.z,set:v=>{STAGES[stage].p.z=v;wantPos.z=v;}},
    {k:'카메라 높이',min:0.3,max:1.9,step:0.02,get:()=>STAGES[stage].t.y,set:v=>{STAGES[stage].t.y=v;STAGES[stage].p.y=v;wantTgt.y=v;wantPos.y=v;}},
    {k:'회전 속도',min:0,max:0.012,step:0.0005,get:()=>rotSpeed,set:v=>rotSpeed=v},
  ];
  const box=document.getElementById('dbgRows');
  function out(){document.getElementById('dbgOut').textContent=
    `HEAD_SC=${HEAD_SC.toFixed(3)} HEAD_Y=${HEAD_Y.toFixed(3)} HEAD_Z=${HEAD_Z.toFixed(3)}\n[${stage}] dist=${STAGES[stage].p.z.toFixed(2)} h=${STAGES[stage].t.y.toFixed(2)} | spin=${rotSpeed.toFixed(4)}`;}
  rows.forEach(r=>{
    const d=document.createElement('div');d.style.margin='7px 0';
    d.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink2);margin-bottom:3px"><span>${r.k}</span><b class="dv" style="font-family:var(--mono);color:var(--signal2)">${r.get().toFixed(3)}</b></div><input type="range" min="${r.min}" max="${r.max}" step="${r.step}" value="${r.get()}" style="width:100%">`;
    const inp=d.querySelector('input'),dv=d.querySelector('.dv');
    inp.addEventListener('input',e=>{r.set(parseFloat(e.target.value));dv.textContent=parseFloat(e.target.value).toFixed(3);rebuildAll();out();});
    box.appendChild(d);r._inp=inp;r._dv=dv;
  });
  function refresh(){rows.forEach(r=>{r._inp.value=r.get();r._dv.textContent=r.get().toFixed(3);});out();}
  document.getElementById('dbgToggle').onclick=()=>{const e=document.getElementById('dbg');e.style.display=e.style.display==='none'?'block':'none';refresh();};
  document.getElementById('dbgFront').onclick=()=>{paused=true;rotY=0;idle=0;};
  document.getElementById('dbgSpin').onclick=()=>{paused=false;};
  window._dbgRefresh=refresh;
})();

/* ===== 메인 앱 연동 (postMessage) ===== */
window.addEventListener('message',function(e){
  const d=e.data||{};
  if(d.type==='apikey'&&typeof d.key==='string'){SUSPECT_API_KEY=d.key;}
  if(d.type==='statement'&&d.text){processStatement(d.text,false);}
  if(d.type==='resize'){const v=view0();if(cam&&renderer){cam.aspect=v.w/v.h;cam.updateProjectionMatrix();renderer.setSize(v.w,v.h);}}
});
init();
